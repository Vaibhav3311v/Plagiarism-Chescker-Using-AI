<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Veritas AI | Authentication</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/lucide@latest"></script>
  <link rel="stylesheet" href="styles.css" />
</head>
<body class="auth-page">
  <div id="cursor-glow"></div>
  <div class="neural-bg"></div>
  <div class="bg-shape shape-1"></div>
  <div class="bg-shape shape-2"></div>
  <div id="toast-container" class="toast-container"></div>

  <div class="auth-wrapper">
    <div class="auth-panel glass-panel scroll-reveal scale-up">
      <div class="auth-header">
        <div class="logo logo-animated">
          <i data-lucide="activity" class="logo-icon"></i>
          <h1>Veritas <span class="accent-text">AI</span></h1>
        </div>
      </div>

      <div class="auth-form-container" id="step-container">
        
        <!-- LOGIN FORM -->
        <div class="auth-step active-step" id="step-login">
          <div class="step-header" style="text-align:center; padding-bottom:10px;">
             <h3 style="font-family:'Outfit', sans-serif;">Welcome Back</h3>
          </div>
          
          
          <div id="login-email-container" class="email-container">
            <form id="login-form">
              <div class="input-group">
                <i data-lucide="mail" class="input-icon"></i>
                <input type="email" id="login-email" placeholder="Email Address" required />
              </div>
              <div class="input-group">
                <i data-lucide="lock" class="input-icon"></i>
                <input type="password" id="login-password" class="pw-input" placeholder="Password" required />
                <button type="button" class="pw-toggle-btn" tabindex="-1"><i data-lucide="eye" class="icon-sm"></i></button>
              </div>
              <button type="submit" class="btn btn-primary glowing-btn auth-submit-btn" id="login-submit">
                <span>Log In</span>
                <i data-lucide="arrow-right" class="icon-sm"></i>
              </button>
            </form>
          </div>

          
          <div class="auth-switch">
            Don't have an account? <a href="#" id="goto-signup">Sign Up</a>
          </div>
        </div>

        <!-- SIGNUP FORM -->
        <div class="auth-step" id="step-signup">
          <div class="step-header" style="text-align:center; padding-bottom:10px;">
            <h3 style="font-family:'Outfit', sans-serif;">Create Account</h3>
          </div>
          
          
          <div id="signup-email-container" class="email-container">
            <form id="signup-form">
              <div class="input-group">
                <i data-lucide="user" class="input-icon"></i>
                <input type="text" id="signup-name" placeholder="Full Name" required autocomplete="name" />
              </div>
              <div class="input-group">
                <i data-lucide="mail" class="input-icon"></i>
                <input type="email" id="signup-email" placeholder="Email Address" required />
              </div>
              <div class="input-group">
                <i data-lucide="lock" class="input-icon"></i>
                <input type="password" id="signup-password" class="pw-input" placeholder="Secure Password" required minlength="6" />
                <button type="button" class="pw-toggle-btn" tabindex="-1"><i data-lucide="eye" class="icon-sm"></i></button>
              </div>
              <div class="pw-strength-wrapper hidden" id="signup-strength">
                <div class="pw-bars">
                  <div class="pw-bar" id="sup-bar-1"></div>
                  <div class="pw-bar" id="sup-bar-2"></div>
                  <div class="pw-bar" id="sup-bar-3"></div>
                </div>
                <div class="pw-text" id="sup-strength-text">Weak</div>
              </div>
              <div class="input-group">
                <i data-lucide="shield-check" class="input-icon"></i>
                <input type="password" id="signup-confirm-password" class="pw-input" placeholder="Confirm Password" required />
                <button type="button" class="pw-toggle-btn" tabindex="-1"><i data-lucide="eye" class="icon-sm"></i></button>
              </div>
              <button type="submit" class="btn btn-primary glowing-btn auth-submit-btn" id="signup-submit">
                <span>Sign Up</span>
                <i data-lucide="zap" class="icon-sm"></i>
              </button>
            </form>
            
            <div style="margin: 20px 0; text-align: center; color: var(--text-muted); font-size: 0.85rem;">OR</div>
            
            <button type="button" class="auth-method-btn" id="google-signup-btn">
              <svg class="google-icon" viewBox="0 0 24 24" fill="currentColor" style="width:18px;height:18px;"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
              Sign up with Google
            </button>
          </div>

                    
          <div class="auth-switch">
            Already have an account? <a href="#" id="goto-login">Log In</a>
          </div>
          
                  </div>

        <!-- SET PASSWORD AFTER GOOGLE SIGNUP -->
        <div class="auth-step" id="step-google-password">
          <div class="step-header" style="text-align:center; padding-bottom:10px;">
            <h3 style="font-family:'Outfit', sans-serif;">Set Your Password</h3>
            <p style="color:var(--text-muted); font-size: 0.85rem; margin-top:8px;">
              Please set a password so you can securely log in via Email/Password in the future.
            </p>
          </div>
          <form id="google-password-form">
            <div class="input-group">
              <i data-lucide="lock" class="input-icon"></i>
              <input type="password" id="gp-password" class="pw-input" placeholder="Secure Password" required minlength="6" />
              <button type="button" class="pw-toggle-btn" tabindex="-1"><i data-lucide="eye" class="icon-sm"></i></button>
            </div>
            <div class="pw-strength-wrapper hidden" id="gp-strength">
              <div class="pw-bars">
                <div class="pw-bar" id="gp-bar-1"></div>
                <div class="pw-bar" id="gp-bar-2"></div>
                <div class="pw-bar" id="gp-bar-3"></div>
              </div>
              <div class="pw-text" id="gp-strength-text">Weak</div>
            </div>
            <div class="input-group">
              <i data-lucide="shield-check" class="input-icon"></i>
              <input type="password" id="gp-confirm-password" class="pw-input" placeholder="Confirm Password" required />
              <button type="button" class="pw-toggle-btn" tabindex="-1"><i data-lucide="eye" class="icon-sm"></i></button>
            </div>
            <button type="submit" class="btn btn-primary glowing-btn auth-submit-btn" id="gp-submit">
              <span>Complete Setup</span>
              <i data-lucide="zap" class="icon-sm"></i>
            </button>
          </form>
        </div>

        
      </div>
    </div>
  </div>

  <div id="recaptcha-container"></div>

  <!-- Toast Notification Container -->
  <div id="toast-container" class="toast-container"></div>

  <script src="/firebase-env.js"></script>
  <script type="module" src="firebase-config.js"></script>
  
  <script type="module">
      const { 
        signInWithEmailAndPassword, 
        createUserWithEmailAndPassword, 
        updateProfile,
        updatePassword,
        GoogleAuthProvider,
        signInWithPopup,
        getAdditionalUserInfo,
        sendEmailVerification,
        signOut,
        setDoc,
        doc
      } = window.fbMethods;
      const db = window.fbDb;
      
      const auth = window.fbAuth;

      // DOM Elements
      const stepLogin = document.getElementById('step-login');
      const stepSignup = document.getElementById('step-signup');
      const stepGooglePassword = document.getElementById('step-google-password');
      
      function navigateTo(target) {
        stepLogin.classList.remove('active-step');
        stepSignup.classList.remove('active-step');
        if(stepGooglePassword) stepGooglePassword.classList.remove('active-step');
        
        target.classList.add('active-step');
        lucide.createIcons();
      }
      
        async function saveUserProfile(user, provider) {
          try {
            const profileData = {
              uid: user.uid,
              name: user.displayName || (user.email ? user.email.split('@')[0] : (user.phoneNumber || 'User')),
              email: user.email || null,
              phoneNumber: user.phoneNumber || null,
              provider: provider,
              createdAt: Date.now()
            };
            await setDoc(doc(db, "users", user.uid), profileData);
          } catch(e) {
            console.error("Failed to save profile:", e);
          }
        }

      function showToast(message, type = 'error') {
        const hc = document.getElementById('toast-container');
        const toast = document.createElement('div');
        toast.className = `toast toast-${type}`;
        toast.innerHTML = `<i data-lucide="${type === 'error' ? 'alert-circle' : 'check-circle'}" class="icon-sm"></i> <span>${message}</span>`;
        hc.appendChild(toast);
        lucide.createIcons();
        setTimeout(() => toast.classList.add('toast-show'), 10);
        setTimeout(() => {
          toast.classList.remove('toast-show');
          setTimeout(() => toast.remove(), 300);
        }, 4000);
      }

      function setLoading(btn, isLoading, originalHtml) {
        if (isLoading) {
          btn.disabled = true;
          const w = btn.offsetWidth;
          // Set a tiny min-width so the button doesn't snap if it was large
          if(w > 0) btn.style.minWidth = `${w}px`;
          btn.innerHTML = '<i data-lucide="loader" class="icon-sm spin-icon"></i> <span>Processing...</span>';
          lucide.createIcons();
        } else {
          btn.disabled = false;
          btn.style.minWidth = '';
          btn.innerHTML = originalHtml;
          lucide.createIcons();
        }
      }

      // --- Navigation Links & Tabs ---
      document.getElementById('goto-signup').addEventListener('click', (e) => { e.preventDefault(); navigateTo(stepSignup); });
      document.getElementById('goto-login').addEventListener('click', (e) => { e.preventDefault(); navigateTo(stepLogin); });

      
      
      // --- EMAIL LOGIN FORM ---
      document.getElementById('login-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const btn = document.getElementById('login-submit');
        const ogHtml = btn.innerHTML;
        setLoading(btn, true, ogHtml);
        try {
          const userCredential = await signInWithEmailAndPassword(auth, document.getElementById('login-email').value, document.getElementById('login-password').value);
          
          // Email verification is now optional - allow login without verification
          console.log("User logged in successfully:", userCredential.user.email);
          
          showToast('Login successful.', 'success');
          // Route guard in firebase-config.js will auto-redirect
        } catch (err) {
          setLoading(btn, false, ogHtml);
          let errorMessage = err.message.replace('Firebase:', '').trim();
          
          showToast(errorMessage);
        }
      });

      // --- EMAIL SIGNUP FORM ---
      document.getElementById('signup-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const name = document.getElementById('signup-name').value;
        const email = document.getElementById('signup-email').value;
        const p1 = document.getElementById('signup-password').value;
        const p2 = document.getElementById('signup-confirm-password').value;
        
        if (p1 !== p2) {
          return showToast("Passwords do not match. Please try again.");
        }
        if (p1.length < 6) {
          return showToast("Password must be at least 6 characters.");
        }
        
        const btn = document.getElementById('signup-submit');
        const ogHtml = btn.innerHTML;
        setLoading(btn, true, ogHtml);
        
        // Emergency fallback - force reset after 20 seconds
        const emergencyReset = setTimeout(() => {
          console.warn("Emergency reset triggered");
          setLoading(btn, false, ogHtml);
          showToast("Signup is taking too long. Please try again.", "error");
        }, 20000);
        
        try {
          console.log("Starting signup process...");
          
          // Create user with timeout
          const createUserPromise = createUserWithEmailAndPassword(auth, email, p1);
          const timeoutPromise = new Promise((_, reject) => 
            setTimeout(() => reject(new Error('Signup timeout')), 15000)
          );
          
          const cred = await Promise.race([createUserPromise, timeoutPromise]);
          console.log("User created successfully:", cred.user.uid);
          
          // Update profile (with timeout)
          try {
            const updatePromise = updateProfile(cred.user, { displayName: name });
            await Promise.race([updatePromise, new Promise((_, reject) => 
              setTimeout(() => reject(new Error('Profile update timeout')), 5000)
            )]);
            console.log("Profile updated with name");
          } catch (profileErr) {
            console.warn("Profile update failed:", profileErr);
            // Continue anyway - not critical
          }
          
          // Send email verification (optional - non-blocking)
          try {
            const emailPromise = sendEmailVerification(cred.user);
            await Promise.race([emailPromise, new Promise((_, reject) => 
              setTimeout(() => reject(new Error('Email verification timeout')), 3000)
            )]);
            console.log("Email verification sent");
            showToast("Signup successful! Verification email sent (optional).", "success");
          } catch (emailErr) {
            console.warn("Email verification failed:", emailErr);
            // Continue anyway - user can still login immediately
            showToast("Signup successful! You can now log in.", "success");
          }
          
          // Clear forms
          document.getElementById('signup-form').reset();
          document.getElementById('login-form').reset();
          
          // Clear emergency timeout
          clearTimeout(emergencyReset);
          
          // Navigate to login immediately
          setTimeout(() => {
            navigateTo(stepLogin);
          }, 1500);
          
        } catch (err) {
          console.error("Signup error:", err);
          let errorMessage = err.message.replace('Firebase:', '').trim();
          
          // Handle specific errors
          if (errorMessage.includes('email-already-in-use')) {
            errorMessage = "This email is already registered. Please log in instead.";
          } else if (errorMessage.includes('weak-password')) {
            errorMessage = "Password is too weak. Please choose a stronger password.";
          } else if (errorMessage.includes('invalid-email')) {
            errorMessage = "Please enter a valid email address.";
          } else if (errorMessage.includes('timeout')) {
            errorMessage = "Signup took too long. Please try again.";
          }
          
          showToast(errorMessage);
        } finally {
          // Clear emergency timeout
          clearTimeout(emergencyReset);
          setLoading(btn, false, ogHtml);
        }
      });

      
      // --- GOOGLE SIGNUP FORM ---
      document.getElementById('google-signup-btn').addEventListener('click', async () => {
        const btn = document.getElementById('google-signup-btn');
        const ogHtml = btn.innerHTML;
        setLoading(btn, true, ogHtml);
        window.suppressAuthRedirect = true; // DO NOT send us to index.html yet
        try {
          const provider = new GoogleAuthProvider();
          const result = await signInWithPopup(auth, provider);
          const addInfo = getAdditionalUserInfo(result);
          
          if (!addInfo?.isNewUser) {
            // User already existed! Reject signup and force login.
            window.suppressAuthRedirect = false;
            await signOut(auth);
            throw new Error("User account already exists. Please log in instead.");
          }
          
          // Successful new user -> Intercept UI
          navigateTo(stepGooglePassword);
          showToast('Google auth succeeded. Please set your password.', 'success');
          
        } catch (err) {
          window.suppressAuthRedirect = false;
          setLoading(btn, false, ogHtml);
          showToast(err.message.replace('Firebase:', '').trim(), 'error');
        }
      });

      // --- GOOGLE SET PASSWORD FORM ---
      document.getElementById('google-password-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const p1 = document.getElementById('gp-password').value;
        const p2 = document.getElementById('gp-confirm-password').value;

        if (p1 !== p2) return showToast("Passwords do not match");
        if (p1.length < 6) return showToast("Password must be at least 6 characters");

        const btn = document.getElementById('gp-submit');
        const ogHtml = btn.innerHTML;
        setLoading(btn, true, ogHtml);

        try {
          // Add timeout to prevent infinite loading
          const timeout = setTimeout(() => {
            console.error("Google password setup timeout");
            setLoading(btn, false, ogHtml);
            showToast("Password setup timed out. Please try again.", "error");
          }, 10000); // 10 second timeout
          
          // Add password to their Google account!
          const updatePromise = updatePassword(auth.currentUser, p1);
          await Promise.race([updatePromise, new Promise((_, reject) => 
            setTimeout(() => reject(new Error('Password update timeout')), 8000)
          )]);
          
          // Save to Firestore Database (optional)
          try {
            const savePromise = saveUserProfile(auth.currentUser, 'google');
            await Promise.race([savePromise, new Promise((_, reject) => 
              setTimeout(() => reject(new Error('Database save timeout')), 5000)
            )]);
          } catch (dbErr) {
            console.warn("Database save failed:", dbErr);
            // Continue anyway - not critical
          }

          clearTimeout(timeout);
          
          showToast('Account setup complete! Redirecting...', 'success');
          window.suppressAuthRedirect = false; // allow redirect
          
          setTimeout(() => {
             window.location.href = "index.html";
          }, 800);
        } catch (err) {
          console.error("Google password setup error:", err);
          let errorMessage = err.message.replace("Firebase:", "").trim();
          
          if (errorMessage.includes('timeout')) {
            errorMessage = "Password setup took too long. Please try again.";
          }
          
          showToast(errorMessage);
        } finally {
          setLoading(btn, false, ogHtml);
        }
      });

      // --- UI MICRO-INTERACTIONS ---
      // 1. Password Show/Hide Toggles
      document.querySelectorAll('.pw-toggle-btn').forEach(btn => {
        btn.addEventListener('click', (e) => {
          e.preventDefault();
          const input = btn.previousElementSibling;
          const icon = btn.querySelector('i');
          if (input.type === 'password') {
            input.type = 'text';
            icon.setAttribute('data-lucide', 'eye-off');
          } else {
            input.type = 'password';
            icon.setAttribute('data-lucide', 'eye');
          }
          lucide.createIcons();
        });
      });

      // 2. Real-time Password Strength Validation
      function setupPasswordStrength(inputId, wrapperId, barIds, textId) {
        const input = document.getElementById(inputId);
        const wrapper = document.getElementById(wrapperId);
        const b1 = document.getElementById(barIds[0]);
        const b2 = document.getElementById(barIds[1]);
        const b3 = document.getElementById(barIds[2]);
        const textEl = document.getElementById(textId);

        if(!input || !wrapper) return;

        input.addEventListener('input', () => {
          const val = input.value;
          if(val.length > 0) wrapper.classList.remove('hidden');
          else wrapper.classList.add('hidden');

          let strength = 0;
          if (val.length >= 6) strength++;
          if (val.match(/[A-Z]/) && val.match(/[0-9]/)) strength++;
          if (val.length >= 10 && val.match(/[^A-Za-z0-9]/)) strength++;

          // Reset
          b1.style.background = 'rgba(255,255,255,0.1)';
          b2.style.background = 'rgba(255,255,255,0.1)';
          b3.style.background = 'rgba(255,255,255,0.1)';
          
          if (strength === 1) {
            b1.style.background = '#ef4444'; // Red
            textEl.textContent = 'Weak';
            textEl.style.color = '#ef4444';
          } else if (strength === 2) {
            b1.style.background = '#f59e0b';
            b2.style.background = '#f59e0b'; // Amber
            textEl.textContent = 'Fair';
            textEl.style.color = '#f59e0b';
          } else if (strength === 3) {
            b1.style.background = '#10b981';
            b2.style.background = '#10b981';
            b3.style.background = '#10b981'; // Green
            textEl.textContent = 'Secure';
            textEl.style.color = '#10b981';
          }
        });
      }

      setupPasswordStrength('signup-password', 'signup-strength', ['sup-bar-1', 'sup-bar-2', 'sup-bar-3'], 'sup-strength-text');
      setupPasswordStrength('gp-password', 'gp-strength', ['gp-bar-1', 'gp-bar-2', 'gp-bar-3'], 'gp-strength-text');

      // Reveal animation
      setTimeout(() => {
        document.querySelectorAll('.scroll-reveal').forEach(el => el.classList.add('visible'));
      }, 50);

      // Listen for cursor-style track
      const cursorGlow = document.getElementById('cursor-glow');
      if (cursorGlow) {
        document.addEventListener('mousemove', (e) => {
          cursorGlow.style.left = `${e.clientX}px`;
          cursorGlow.style.top = `${e.clientY}px`;
        });
      }
  </script>
  <script>lucide.createIcons();</script>
</body>
</html>
